<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Avaliação — Marketing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      </div>
      <h1>Avaliação de Marketing</h1>
      <p>Acesse com suas credenciais</p>
    </div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="Digite seu usuário" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">
      <strong>Analista:</strong>  <code></code> BIANCA FERREIRA <code></code><br>
      Use o usuário e senha fornecidos pela administração do sistema.
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- MOBILE TOPBAR -->
  <div class="mobile-topbar" id="mobile-topbar">
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
    </button>
    <div class="mobile-topbar-brand">
      <div class="brand-dot">
